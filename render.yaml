services:
  - type: web
      name: general-dashboard
          runtime: python
              region: frankfurt
                  plan: free
                      buildCommand: pip install -r requirements.txt
                          startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
                              healthCheckPath: /healthz
                                  autoDeploy: true
                                      envVars:
                                            - key: PYTHON_VERSION
                                                    value: "3.11"
                                                          - key: DATABASE_URL
                                                                  sync: false
